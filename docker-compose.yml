version: '3.9'

services:
  mysql:
    image: mysql:5.7
    container_name: db_mysql
    volumes:
      - './mysql_data:/var/lib/mysql'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - 3306:${MYSQL_PORT:-3306}
    expose:
      - ${MYSQL_PORT:-3306}


  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql
